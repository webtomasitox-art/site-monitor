name: site-monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install
        run: npm install

      - name: browser
        run: npx playwright install --with-deps chromium

      - name: monitor
        run: node monitor.js

      - name: save
        run: |
          git config user.name "site-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update monitor results" || echo "nothing to commit"
          git push
